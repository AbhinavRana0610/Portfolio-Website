name: Verify Build

# 1. When should this run?
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      # 2. Check out the code from GitHub
      - name: Checkout Code
        uses: actions/checkout@v4

      # 3. Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # This speeds up future runs by caching dependencies

      # 4. Install Dependencies
      - name: Install Dependencies
        run: npm ci 

      # 5. Run Linting
      - name: Run Lint
        run: npm run lint

      # 6. Run Type Checking
      - name: Run Type Check
        run: npx tsc --noEmit

      # 7. Run Production Build
      - name: Build Project
        run: npm run build
